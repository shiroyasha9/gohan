<title>gohan dashboard</title>
<style>
:root {
  --page: #f7f8f9;
  --surface: #ffffff;
  --ink: #14161a;
  --ink-2: #454a51;
  --muted: #7d828b;
  --grid: #e7e9ec;
  --axis: #cfd2d7;
  --border: rgba(20, 22, 26, 0.1);
  --kcal: #2a78d6;
  --kcal-wash: rgba(42, 120, 214, 0.09);
  --protein: #1baf7a;
  --protein-wash: rgba(27, 175, 122, 0.08);
  --cheat: #eb6834;
  --treatment-wash: rgba(125, 130, 139, 0.15);
  --heat-1: #8ab8f0;
  --heat-2: #5598e7;
  --heat-3: #256abf;
  --heat-4: #104281;
  --tooltip-bg: #14161a;
  --tooltip-ink: #ffffff;
  --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-round:
    ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN", system-ui,
    sans-serif;
  color-scheme: light;
}
@media (prefers-color-scheme: dark) {
  :root:where(:not([data-theme="light"])) {
    --page: #0e1013;
    --surface: #16191d;
    --ink: #f4f5f6;
    --ink-2: #b6bac1;
    --muted: #81868f;
    --grid: #24272c;
    --axis: #34383e;
    --border: rgba(244, 245, 246, 0.1);
    --kcal: #3987e5;
    --kcal-wash: rgba(57, 135, 229, 0.14);
    --protein: #199e70;
    --protein-wash: rgba(25, 158, 112, 0.1);
    --cheat: #d95926;
    --treatment-wash: rgba(129, 134, 143, 0.16);
    --heat-1: #1c5cab;
    --heat-2: #2a78d6;
    --heat-3: #5598e7;
    --heat-4: #9ec5f4;
    --tooltip-bg: #f4f5f6;
    --tooltip-ink: #14161a;
    color-scheme: dark;
  }
}
:root[data-theme="dark"] {
  --page: #0e1013;
  --surface: #16191d;
  --ink: #f4f5f6;
  --ink-2: #b6bac1;
  --muted: #81868f;
  --grid: #24272c;
  --axis: #34383e;
  --border: rgba(244, 245, 246, 0.1);
  --kcal: #3987e5;
  --kcal-wash: rgba(57, 135, 229, 0.14);
  --protein: #199e70;
  --protein-wash: rgba(25, 158, 112, 0.1);
  --cheat: #d95926;
  --treatment-wash: rgba(129, 134, 143, 0.16);
  --heat-1: #1c5cab;
  --heat-2: #2a78d6;
  --heat-3: #5598e7;
  --heat-4: #9ec5f4;
  --tooltip-bg: #f4f5f6;
  --tooltip-ink: #14161a;
  color-scheme: dark;
}

body {
  padding: clamp(20px, 4vw, 44px) clamp(16px, 4vw, 44px) 80px;
  margin: 0;
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--page);
}
.wrap {
  display: grid;
  grid-template-columns: 1fr;
  gap: 44px;
  max-width: 1120px;
  margin: 0 auto;
}
@media (min-width: 920px) {
  .wrap {
    grid-template-columns: 1fr 1fr;
    gap: 52px 64px;
  }
  .span {
    grid-column: 1 / -1;
  }
}

header.top {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 16px;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
header.top h1 {
  margin: 0;
  font-family: var(--font-round);
  font-size: 23px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
header.top h1 .jp {
  margin-left: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.02em;
}
header.top .window {
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  color: var(--ink-2);
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px 0;
}
.stat {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
  padding: 2px 16px 2px 20px;
  border-left: 1px solid var(--border);
}
.stat:nth-child(odd) {
  padding-left: 0;
  border-left: none;
}
@media (min-width: 640px) {
  .stats {
    grid-template-columns: repeat(4, 1fr);
  }
  .stat:nth-child(odd) {
    padding-left: 20px;
    border-left: 1px solid var(--border);
  }
  .stat:first-child {
    padding-left: 0;
    border-left: none;
  }
}
.stat .label {
  font-size: 12px;
  color: var(--muted);
}
.stat .value {
  font-family: var(--font-round);
  font-size: 29px;
  font-weight: 650;
  font-variant-numeric: tabular-nums;
  line-height: 1.15;
  letter-spacing: -0.01em;
}
.stat .value .unit {
  margin-left: 3px;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0;
}
.stat .sub {
  font-size: 12.5px;
  font-variant-numeric: tabular-nums;
  color: var(--ink-2);
}

section h2 {
  margin: 0;
  font-size: 17px;
  font-weight: 650;
  letter-spacing: -0.01em;
}
section .key {
  margin: 5px 0 16px;
  font-size: 12.5px;
  color: var(--muted);
}
section .key .swatch {
  display: inline-block;
  width: 10px;
  height: 10px;
  margin: 0 4px -1px 0;
  border-radius: 3px;
}
section .key .dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  margin: 0 4px 0 0;
  border-radius: 50%;
}
section .key .glyph {
  margin-right: 3px;
  font-size: 9px;
  color: var(--ink-2);
}
section svg {
  display: block;
  width: 100%;
  height: auto;
}
.scrollbox {
  overflow-x: auto;
}
.empty {
  padding: 26px 0;
  font-size: 13.5px;
  color: var(--muted);
}

svg text {
  font-family: var(--font-ui);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  fill: var(--muted);
}
svg .refline-label {
  fill: var(--ink-2);
}
.bar:hover,
.bar:focus-visible {
  outline: none;
  filter: brightness(1.18);
}
@media (prefers-reduced-motion: no-preference) {
  .bar {
    transition: filter 120ms ease;
  }
}

.insights {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 14px;
}
.insights p {
  max-width: 66ch;
  margin: 0;
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--ink-2);
  text-wrap: pretty;
}

details.tableview {
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
details.tableview summary {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
}
details.tableview summary:focus-visible {
  outline: 2px solid var(--kcal);
  outline-offset: 2px;
}
table {
  width: 100%;
  min-width: 560px;
  margin-top: 14px;
  font-size: 12.5px;
  font-variant-numeric: tabular-nums;
  border-collapse: collapse;
}
th {
  font-weight: 600;
  color: var(--muted);
  text-align: right;
}
th:first-child {
  text-align: left;
}
td {
  color: var(--ink-2);
  text-align: right;
}
td:first-child {
  color: var(--ink);
  text-align: left;
}
th,
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--grid);
}

.heatwrap {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}
.heat-days {
  display: flex;
  flex: none;
  flex-direction: column;
  gap: 4px;
  padding-top: 20px;
}
.heat-days span {
  height: 18px;
  font-size: 10.5px;
  line-height: 18px;
  color: var(--muted);
}
.heat-cols {
  display: flex;
  gap: 4px;
}
.heat-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.heat-month {
  height: 16px;
  font-size: 10.5px;
  color: var(--muted);
  white-space: nowrap;
}
.cell {
  position: relative;
  width: 18px;
  height: 18px;
  border-radius: 4px;
  box-shadow: inset 0 0 0 1px var(--grid);
}
.cell.logged {
  box-shadow: none;
}
.cell.blank {
  box-shadow: none;
}
.cell.cheat::after {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 5px;
  height: 5px;
  content: "";
  background: var(--cheat);
  border: 1px solid var(--surface);
  border-radius: 50%;
}
.cell:focus-visible {
  outline: 2px solid var(--kcal);
  outline-offset: 1px;
}
.streakline {
  margin: 14px 0 0;
  font-size: 12.5px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
}

#tooltip {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10;
  visibility: hidden;
  max-width: 240px;
  padding: 8px 11px;
  font-size: 12px;
  line-height: 1.45;
  color: var(--tooltip-ink);
  pointer-events: none;
  background: var(--tooltip-bg);
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
}
#tooltip .tv {
  font-weight: 650;
  font-variant-numeric: tabular-nums;
}
#tooltip .tl {
  opacity: 0.75;
}

footer {
  font-size: 12.5px;
  color: var(--muted);
}
</style>

<div class="wrap">
  <header class="top span">
    <h1>gohan <span class="jp">ご飯</span></h1>
    <span class="window" id="windowLabel"></span>
  </header>
  <div class="stats span" id="stats"></div>
  <section class="span" id="kcalCard">
    <h2>Calories</h2>
    <p class="key" id="kcalKey"></p>
    <div id="kcalChart"></div>
  </section>
  <section id="weightCard">
    <h2>Weight</h2>
    <p class="key" id="weightKey"></p>
    <div id="weightChart"></div>
  </section>
  <section id="proteinCard">
    <h2>Protein</h2>
    <p class="key" id="proteinKey"></p>
    <div id="proteinChart"></div>
  </section>
  <section id="heatCard">
    <h2>Logging</h2>
    <p class="key" id="heatKey"></p>
    <div class="scrollbox">
      <div class="heatwrap" id="heatmap"></div>
    </div>
    <p class="streakline" id="streakline"></p>
  </section>
  <section id="insightsCard">
    <h2>Observations</h2>
    <div class="insights" id="insights"></div>
  </section>
  <details class="tableview span">
    <summary>Day by day</summary>
    <div class="scrollbox" id="tablebox"></div>
  </details>
  <footer class="span" id="footer"></footer>
</div>
<div id="tooltip" role="status"></div>

<script>
"use strict";
// biome-ignore lint/correctness/noUndeclaredVariables: injection token replaced at publish time
const DATA = __GOHAN_DATA__;
// biome-ignore lint/correctness/noUndeclaredVariables: injection token replaced at publish time
const INSIGHTS = __GOHAN_INSIGHTS__;

const UNCERTAINTY = { high: 0.05, medium: 0.15, low: 0.3 };
const PROTEIN_PER_KG_REF = 1.6;
const MONTHS = [
  "Jan",
  "Feb",
  "Mar",
  "Apr",
  "May",
  "Jun",
  "Jul",
  "Aug",
  "Sep",
  "Oct",
  "Nov",
  "Dec",
];
const SVGNS = "http://www.w3.org/2000/svg";

const fmtInt = (n) => Math.round(n).toLocaleString("en-US");
const fmt1 = (n) => (Math.round(n * 10) / 10).toLocaleString("en-US");
const parseDate = (iso) => new Date(`${iso}T00:00:00Z`);
const shortDate = (iso) => {
  const d = parseDate(iso);
  return `${MONTHS[d.getUTCMonth()]} ${d.getUTCDate()}`;
};
const weekdayIndexMon = (iso) => (parseDate(iso).getUTCDay() + 6) % 7;

function el(tag, attrs, parent) {
  const node = document.createElementNS(SVGNS, tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    node.setAttribute(k, v);
  }
  if (parent) {
    parent.appendChild(node);
  }
  return node;
}
function html(tag, className, parent) {
  const node = document.createElement(tag);
  if (className) {
    node.className = className;
  }
  if (parent) {
    parent.appendChild(node);
  }
  return node;
}

const tooltip = document.getElementById("tooltip");
function showTooltip(rows, clientX, clientY) {
  tooltip.replaceChildren();
  for (const [label, value] of rows) {
    const line = document.createElement("div");
    const v = document.createElement("span");
    v.className = "tv";
    v.textContent = value;
    const l = document.createElement("span");
    l.className = "tl";
    l.textContent = label ? ` ${label}` : "";
    line.append(v, l);
    tooltip.appendChild(line);
  }
  tooltip.style.visibility = "visible";
  const pad = 12;
  const rect = tooltip.getBoundingClientRect();
  let x = clientX + pad;
  let y = clientY - rect.height - pad;
  if (x + rect.width > window.innerWidth - 8) {
    x = clientX - rect.width - pad;
  }
  if (y < 8) {
    y = clientY + pad;
  }
  tooltip.style.left = `${x}px`;
  tooltip.style.top = `${y}px`;
}
function hideTooltip() {
  tooltip.style.visibility = "hidden";
}
function bindTooltip(node, rowsFn) {
  node.addEventListener("pointermove", (e) =>
    showTooltip(rowsFn(), e.clientX, e.clientY)
  );
  node.addEventListener("pointerleave", hideTooltip);
  node.addEventListener("focus", () => {
    const r = node.getBoundingClientRect();
    showTooltip(rowsFn(), r.left + r.width / 2, r.top);
  });
  node.addEventListener("blur", hideTooltip);
}

function niceTicks(max, count) {
  const rough = max / count;
  const mag = 10 ** Math.floor(Math.log10(rough));
  const step =
    [1, 2, 2.5, 5, 10].map((m) => m * mag).find((s) => max / s <= count) ||
    10 * mag;
  const ticks = [];
  for (let v = 0; v <= max + 1e-9; v += step) {
    ticks.push(v);
  }
  return ticks;
}

function roundedTopBar(x, y, w, h, r) {
  if (h <= 0 || w <= 0) {
    return "";
  }
  const rr = Math.min(r, w / 2, h);
  return `M${x},${y + h}V${y + rr}Q${x},${y} ${x + rr},${y}H${x + w - rr}Q${x + w},${y} ${x + w},${y + rr}V${y + h}Z`;
}

function keyEntry(parent, markClass, markColor, text) {
  const mark = document.createElement("span");
  mark.className = markClass;
  if (markColor) {
    mark.style.background = markColor;
  }
  parent.appendChild(mark);
  parent.appendChild(document.createTextNode(text));
}
function keyGlyph(parent, glyph, text) {
  const mark = document.createElement("span");
  mark.className = "glyph";
  mark.textContent = glyph;
  parent.appendChild(mark);
  parent.appendChild(document.createTextNode(text));
}
function keySep(parent) {
  parent.appendChild(document.createTextNode("  ·  "));
}

function uncertaintyKcal(day) {
  const c = day.kcalByConfidence;
  return (
    c.high * UNCERTAINTY.high +
    c.medium * UNCERTAINTY.medium +
    c.low * UNCERTAINTY.low
  );
}

function referenceKg() {
  const trend = DATA.derived.weightTrend;
  if (trend.length > 0) {
    return trend.at(-1).kg;
  }
  if (DATA.profile.latestWeightKg !== null) {
    return DATA.profile.latestWeightKg;
  }
  return DATA.profile.startingWeightKg;
}

function envelopeAt(date, kind) {
  const seg = DATA.envelopes.find((s) => s.from <= date && date <= s.to);
  return seg ? seg[kind] : null;
}

function renderWindowLabel() {
  document.getElementById("windowLabel").textContent = `${shortDate(
    DATA.from
  )} – ${shortDate(DATA.to)} · ${DATA.days.length} days`;
  const generated = DATA.generatedAt
    ? shortDate(DATA.generatedAt)
    : shortDate(DATA.to);
  document.getElementById("footer").textContent =
    `Generated ${generated} · gohan counts and reports; coaching stays with your dietician.`;
}

function stat(parent, label, valueText, unit, sub) {
  const t = html("div", "stat", parent);
  html("span", "label", t).textContent = label;
  const v = html("span", "value", t);
  v.textContent = valueText;
  if (unit) {
    const u = document.createElement("span");
    u.className = "unit";
    u.textContent = unit;
    v.appendChild(u);
  }
  if (sub) {
    html("span", "sub", t).textContent = sub;
  }
}

function renderStats() {
  const root = document.getElementById("stats");
  const d = DATA.derived;
  const trend = d.weightTrend;
  const lastTrend = trend.length ? trend.at(-1).kg : null;
  let trendSub = "no weigh-ins yet";
  if (d.changeRateKgPerWeek !== null) {
    const sign = d.changeRateKgPerWeek > 0 ? "+" : "";
    trendSub = `${sign}${fmt1(d.changeRateKgPerWeek)} kg/week`;
  } else if (lastTrend !== null) {
    trendSub = "one weigh-in so far";
  }
  stat(
    root,
    "Trend weight",
    lastTrend === null ? "—" : fmt1(lastTrend),
    lastTrend === null ? "" : "kg",
    trendSub
  );
  stat(
    root,
    "Est. daily burn",
    d.tdee === null ? "—" : fmtInt(d.tdee),
    d.tdee === null ? "" : "kcal",
    d.tdee === null
      ? "needs 14 paired days of intake + weight"
      : "from intake + weight trend"
  );
  const envMid = (() => {
    const seg = DATA.envelopes.at(-1);
    return seg ? Math.round((seg.kcal.min + seg.kcal.max) / 2) : null;
  })();
  stat(
    root,
    "Intake, last 7 days",
    d.avgKcal7d === null ? "—" : fmtInt(d.avgKcal7d),
    d.avgKcal7d === null ? "" : "kcal",
    d.avgKcal7d !== null && envMid !== null
      ? `${d.avgKcal7d >= envMid ? "+" : "−"}${fmtInt(
          Math.abs(d.avgKcal7d - envMid)
        )} vs plan midpoint`
      : "daily average when logged"
  );
  stat(
    root,
    "Protein",
    d.proteinPerKgAvg === null ? "—" : String(d.proteinPerKgAvg),
    d.proteinPerKgAvg === null ? "" : "g/kg",
    `research mark: ${PROTEIN_PER_KG_REF} g/kg/day`
  );
}

function drawGridAndTicks(svg, geo, ticks, fmt) {
  for (const t of ticks) {
    el(
      "line",
      {
        x1: geo.M.left,
        x2: geo.M.left + geo.plotW,
        y1: geo.y(t),
        y2: geo.y(t),
        stroke: t === 0 ? "var(--axis)" : "var(--grid)",
        "stroke-width": 1,
      },
      svg
    );
    if (t > 0) {
      const lbl = el(
        "text",
        { x: geo.M.left - 6, y: geo.y(t) + 3, "text-anchor": "end" },
        svg
      );
      lbl.textContent = (fmt || fmtInt)(t);
    }
  }
}

function drawEnvelopeBand(svg, geo, days, bandKind, washVar, edgeVar) {
  for (const seg of DATA.envelopes) {
    const i0 = days.findIndex((d) => d.date === seg.from);
    const i1 = days.findIndex((d) => d.date === seg.to);
    if (i0 < 0 || i1 < 0) {
      continue;
    }
    const x = geo.x(i0);
    const w = geo.x(i1) + geo.bandW - x;
    const yTop = geo.y(seg[bandKind].max);
    const yBot = geo.y(seg[bandKind].min);
    el(
      "rect",
      {
        x,
        width: w,
        y: yTop,
        height: Math.max(0, yBot - yTop),
        fill: washVar,
      },
      svg
    );
    for (const yEdge of [yTop, yBot]) {
      el(
        "line",
        {
          x1: x,
          x2: x + w,
          y1: yEdge,
          y2: yEdge,
          stroke: edgeVar,
          "stroke-width": 1,
          opacity: 0.35,
        },
        svg
      );
    }
  }
}

function drawBandLabel(svg, geo, refLines, bandKind) {
  const seg = DATA.envelopes.at(-1);
  if (!seg) {
    return;
  }
  const yMid = geo.y((seg[bandKind].min + seg[bandKind].max) / 2);
  const collides = refLines.some(
    (r) => r.value !== null && Math.abs(geo.y(r.value) - yMid) < 14
  );
  if (collides) {
    return;
  }
  const lbl = el("text", { x: geo.M.left + geo.plotW + 5, y: yMid + 3 }, svg);
  lbl.textContent = "plan";
}

function drawDateLabels(svg, geo, days, centered) {
  const slots = Math.max(2, Math.floor(geo.plotW / 76));
  const labelEvery = Math.max(1, Math.ceil(days.length / slots));
  for (const [i, d] of days.entries()) {
    if (i % labelEvery === 0) {
      const lbl = el(
        "text",
        {
          x: geo.x(i) + (centered ? geo.bandW / 2 : 0),
          y: geo.M.top + geo.plotH + 16,
          "text-anchor": "middle",
        },
        svg
      );
      lbl.textContent = shortDate(d.date);
    }
  }
}

function drawWhisker(svg, geo, cx, v, u) {
  if (u <= 1) {
    return;
  }
  el(
    "line",
    {
      x1: cx,
      x2: cx,
      y1: geo.y(Math.max(0, v - u)),
      y2: geo.y(v + u),
      stroke: "var(--ink-2)",
      "stroke-width": 1.5,
      "stroke-linecap": "round",
      opacity: 0.6,
      "pointer-events": "none",
    },
    svg
  );
}

function drawWorkoutMark(svg, geo, cx, d) {
  const cy = geo.M.top + geo.plotH + 26;
  const mark = el(
    "path",
    {
      d: `M${cx - 4},${cy + 3}L${cx + 4},${cy + 3}L${cx},${cy - 4}Z`,
      fill: "var(--muted)",
      tabindex: 0,
      role: "img",
      "aria-label": `${shortDate(d.date)}: workout ${d.workoutMin} min`,
    },
    svg
  );
  bindTooltip(mark, () => [
    [shortDate(d.date), ""],
    ["min workout", String(d.workoutMin)],
  ]);
}

function drawRefLines(svg, geo, refLines) {
  for (const ref of refLines) {
    if (ref.value === null || ref.value === undefined) {
      continue;
    }
    el(
      "line",
      {
        x1: geo.M.left,
        x2: geo.M.left + geo.plotW,
        y1: geo.y(ref.value),
        y2: geo.y(ref.value),
        stroke: "var(--ink-2)",
        "stroke-width": 1.5,
        "stroke-dasharray": "5 4",
      },
      svg
    );
    const lbl = el(
      "text",
      {
        x: geo.M.left + geo.plotW + 5,
        y: geo.y(ref.value) + 3,
        class: "refline-label",
      },
      svg
    );
    lbl.textContent = ref.label;
  }
}

function chartWidth(mount) {
  return Math.max(340, mount.clientWidth || 680);
}

function barChart(config) {
  const {
    mount,
    days,
    valueOf: dayValue,
    bandKind,
    refLines,
    whiskers,
    workoutRow,
  } = config;
  mount.replaceChildren();
  const logged = days.filter((d) => d.logged);
  if (logged.length === 0) {
    const key = document.getElementById(config.keyId);
    if (key) {
      key.remove();
    }
    html("p", "empty", mount).textContent = config.emptyText;
    return;
  }
  const W = chartWidth(mount);
  const M = { top: 14, right: 58, bottom: workoutRow ? 34 : 24, left: 42 };
  const plotW = W - M.left - M.right;
  const bandVals = DATA.envelopes.flatMap((s) =>
    bandKind ? [s[bandKind].max] : []
  );
  const maxVal = Math.max(
    ...logged.map((d) => dayValue(d) + (whiskers ? uncertaintyKcal(d) : 0)),
    ...bandVals,
    ...refLines.map((r) => r.value || 0)
  );
  const ticks = niceTicks(maxVal * 1.06, 4);
  const yMax = Math.max(ticks.at(-1), maxVal * 1.06);
  const plotH = config.plotH;
  const H = plotH + M.top + M.bottom;
  const svg = el("svg", { viewBox: `0 0 ${W} ${H}`, role: "img" }, null);
  const geo = {
    M,
    plotW,
    plotH,
    bandW: plotW / days.length,
    x: (i) => M.left + (i * plotW) / days.length,
    y: (v) => M.top + plotH - (v / yMax) * plotH,
  };

  drawGridAndTicks(svg, geo, ticks);
  if (bandKind) {
    drawEnvelopeBand(svg, geo, days, bandKind, config.washVar, config.barVar);
  }
  drawDateLabels(svg, geo, days, true);

  const barW = Math.min(11, Math.max(2, geo.bandW * 0.55));
  for (const [i, d] of days.entries()) {
    if (!d.logged) {
      continue;
    }
    const v = dayValue(d);
    const bx = geo.x(i) + (geo.bandW - barW) / 2;
    const bar = el(
      "path",
      {
        d: roundedTopBar(bx, geo.y(v), barW, geo.y(0) - geo.y(v), 3),
        class: "bar",
        fill: config.barVar,
        tabindex: 0,
        role: "img",
        "aria-label": `${shortDate(d.date)}: ${fmtInt(v)} ${config.unit}`,
      },
      svg
    );
    bindTooltip(bar, () => config.tooltipRows(d));
    if (whiskers) {
      drawWhisker(svg, geo, bx + barW / 2, v, uncertaintyKcal(d));
    }
    if (workoutRow && d.workoutMin > 0) {
      drawWorkoutMark(svg, geo, geo.x(i) + geo.bandW / 2, d);
    }
  }

  drawRefLines(svg, geo, refLines);
  if (bandKind) {
    drawBandLabel(svg, geo, refLines, bandKind);
  }
  mount.appendChild(svg);
}

function initKcalKey() {
  const key = document.getElementById("kcalKey");
  const parts = [];
  if (DATA.envelopes.length > 0) {
    parts.push(() =>
      keyEntry(key, "swatch", "var(--kcal-wash)", "plan envelope")
    );
  }
  if (DATA.derived.tdee !== null) {
    parts.push(() => keyEntry(key, "", null, "dashed = est. burn"));
  }
  if (DATA.days.some((d) => d.workoutMin > 0)) {
    parts.push(() => keyGlyph(key, "▲", "workout day"));
  }
  if (DATA.days.some((d) => d.logged && uncertaintyKcal(d) > 1)) {
    parts.push(() => keyEntry(key, "", null, "whisker = estimate uncertainty"));
  }
  for (const [i, add] of parts.entries()) {
    if (i > 0) {
      keySep(key);
    }
    add();
  }
}

function renderKcalChart() {
  barChart({
    mount: document.getElementById("kcalChart"),
    keyId: "kcalKey",
    days: DATA.days,
    unit: "kcal",
    plotH: 230,
    barVar: "var(--kcal)",
    washVar: "var(--kcal-wash)",
    emptyText: "No meals logged in this window yet.",
    valueOf: (d) => d.totals.kcal,
    bandKind: "kcal",
    whiskers: true,
    workoutRow: true,
    refLines: [{ value: DATA.derived.tdee, label: "est. burn" }],
    tooltipRows: (d) => {
      const rows = [
        [shortDate(d.date), ""],
        ["kcal", fmtInt(d.totals.kcal)],
        ["g protein", fmt1(d.totals.protein)],
      ];
      const env = envelopeAt(d.date, "kcal");
      if (env) {
        rows.push([`plan ${fmtInt(env.min)}–${fmtInt(env.max)}`, ""]);
      }
      if (d.cheats > 0) {
        rows.push([`cheat: ${d.cheatSlots.join(", ")}`, ""]);
      }
      return rows;
    },
  });
}

function initProteinKey() {
  const key = document.getElementById("proteinKey");
  const hasBand = DATA.envelopes.length > 0;
  if (hasBand) {
    keyEntry(key, "swatch", "var(--protein-wash)", "plan protein band");
  }
  if (referenceKg()) {
    if (hasBand) {
      keySep(key);
    }
    keyEntry(
      key,
      "",
      null,
      `dashed = ${PROTEIN_PER_KG_REF} g/kg research mark`
    );
  }
}

function renderProteinChart() {
  const refKg = referenceKg();
  barChart({
    mount: document.getElementById("proteinChart"),
    keyId: "proteinKey",
    days: DATA.days,
    unit: "g protein",
    plotH: 180,
    barVar: "var(--protein)",
    washVar: "var(--protein-wash)",
    emptyText: "No meals logged in this window yet.",
    valueOf: (d) => d.totals.protein,
    bandKind: "protein",
    whiskers: false,
    workoutRow: false,
    refLines: [
      refKg
        ? {
            value: Math.round(refKg * PROTEIN_PER_KG_REF),
            label: `${PROTEIN_PER_KG_REF} g/kg`,
          }
        : { value: null, label: "" },
    ],
    tooltipRows: (d) => {
      const rows = [
        [shortDate(d.date), ""],
        ["g protein", fmt1(d.totals.protein)],
      ];
      const env = envelopeAt(d.date, "protein");
      if (env) {
        rows.push([`plan ${fmtInt(env.min)}–${fmtInt(env.max)} g`, ""]);
      }
      return rows;
    },
  });
}

function initWeightKey() {
  const weighIns = DATA.days.filter((d) => d.weightKg !== null);
  const key = document.getElementById("weightKey");
  if (weighIns.length === 0) {
    key.remove();
    return;
  }
  keyEntry(key, "dot", "var(--muted)", "weigh-in");
  keySep(key);
  keyEntry(key, "dot", "var(--kcal)", "smoothed trend");
  const treatments = DATA.days.filter((d) => d.treatment !== null);
  if (treatments.length > 0) {
    keySep(key);
    keyEntry(key, "swatch", "var(--treatment-wash)", "treatment day");
  }
}

function weightScales(mount, weighIns, trend) {
  const W = chartWidth(mount);
  const M = { top: 14, right: 58, bottom: 24, left: 44 };
  const plotW = W - M.left - M.right;
  const plotH = 200;
  const kgs = weighIns.map((d) => d.weightKg).concat(trend.map((t) => t.kg));
  const lo = Math.floor(Math.min(...kgs) * 2) / 2 - 0.5;
  const hi = Math.ceil(Math.max(...kgs) * 2) / 2 + 0.5;
  const days = DATA.days;
  return {
    W,
    M,
    plotW,
    plotH,
    H: plotH + M.top + M.bottom,
    lo,
    hi,
    x: (i) => M.left + ((i + 0.5) * plotW) / days.length,
    y: (kg) => M.top + plotH - ((kg - lo) / (hi - lo)) * plotH,
  };
}

function drawWeightAxes(svg, s) {
  const step = (s.hi - s.lo) / 4;
  for (let t = 0; t <= 4; t++) {
    const kg = s.lo + t * step;
    el(
      "line",
      {
        x1: s.M.left,
        x2: s.M.left + s.plotW,
        y1: s.y(kg),
        y2: s.y(kg),
        stroke: t === 0 ? "var(--axis)" : "var(--grid)",
        "stroke-width": 1,
      },
      svg
    );
    const lbl = el(
      "text",
      { x: s.M.left - 6, y: s.y(kg) + 3, "text-anchor": "end" },
      svg
    );
    lbl.textContent = fmt1(kg);
  }
  const days = DATA.days;
  const slots = Math.max(2, Math.floor(s.plotW / 76));
  const labelEvery = Math.max(1, Math.ceil(days.length / slots));
  for (const [i, d] of days.entries()) {
    if (i % labelEvery === 0) {
      const lbl = el(
        "text",
        { x: s.x(i), y: s.M.top + s.plotH + 16, "text-anchor": "middle" },
        svg
      );
      lbl.textContent = shortDate(d.date);
    }
  }
}

function drawTrendArea(svg, s, trend, idx) {
  if (trend.length < 2) {
    return;
  }
  const line = trend
    .map(
      (t, i) => `${(i === 0 ? "M" : "L") + s.x(idx.get(t.date))},${s.y(t.kg)}`
    )
    .join("");
  const defs = el("defs", {}, svg);
  const grad = el(
    "linearGradient",
    { id: "gohan-wgrad", x1: 0, y1: 0, x2: 0, y2: 1 },
    defs
  );
  const stopTop = el("stop", { offset: "0%", "stop-opacity": 0.16 }, grad);
  stopTop.style.stopColor = "var(--kcal)";
  const stopBot = el("stop", { offset: "100%", "stop-opacity": 0 }, grad);
  stopBot.style.stopColor = "var(--kcal)";
  const first = trend[0];
  const last = trend.at(-1);
  const base = s.M.top + s.plotH;
  el(
    "path",
    {
      d: `${line}L${s.x(idx.get(last.date))},${base}L${s.x(
        idx.get(first.date)
      )},${base}Z`,
      fill: "url(#gohan-wgrad)",
      "pointer-events": "none",
    },
    svg
  );
  el(
    "path",
    {
      d: line,
      fill: "none",
      stroke: "var(--kcal)",
      "stroke-width": 2,
      "stroke-linejoin": "round",
      "stroke-linecap": "round",
    },
    svg
  );
}

function bindWeightHover(svg, s, crosshair, trend) {
  const days = DATA.days;
  const trendByDate = new Map(trend.map((t) => [t.date, t.kg]));
  const overlay = el(
    "rect",
    {
      x: s.M.left,
      y: s.M.top,
      width: s.plotW,
      height: s.plotH,
      fill: "transparent",
    },
    svg
  );
  overlay.addEventListener("pointermove", (e) => {
    const rect = svg.getBoundingClientRect();
    const px = ((e.clientX - rect.left) / rect.width) * s.W;
    const i = Math.max(
      0,
      Math.min(
        days.length - 1,
        Math.floor(((px - s.M.left) / s.plotW) * days.length)
      )
    );
    const d = days[i];
    crosshair.setAttribute("x1", s.x(i));
    crosshair.setAttribute("x2", s.x(i));
    crosshair.setAttribute("visibility", "visible");
    const rows = [[shortDate(d.date), ""]];
    if (d.weightKg !== null) {
      rows.push(["kg weighed", fmt1(d.weightKg)]);
    }
    if (trendByDate.has(d.date)) {
      rows.push(["kg trend", fmt1(trendByDate.get(d.date))]);
    }
    if (d.treatment !== null) {
      rows.push([d.treatment, ""]);
    }
    if (rows.length === 1) {
      rows.push(["no weigh-in", ""]);
    }
    showTooltip(rows, e.clientX, e.clientY);
  });
  overlay.addEventListener("pointerleave", () => {
    crosshair.setAttribute("visibility", "hidden");
    hideTooltip();
  });
}

function renderWeightChart() {
  const mount = document.getElementById("weightChart");
  mount.replaceChildren();
  const weighIns = DATA.days.filter((d) => d.weightKg !== null);
  const trend = DATA.derived.weightTrend;
  if (weighIns.length === 0) {
    html("p", "empty", mount).textContent =
      "No weigh-ins yet — the trend starts with the first one.";
    return;
  }
  const s = weightScales(mount, weighIns, trend);
  const svg = el("svg", { viewBox: `0 0 ${s.W} ${s.H}`, role: "img" }, null);
  const days = DATA.days;
  const idx = new Map(days.map((d, i) => [d.date, i]));

  drawWeightAxes(svg, s);
  for (const d of days.filter((day) => day.treatment !== null)) {
    const i = idx.get(d.date);
    el(
      "rect",
      {
        x: s.x(i) - s.plotW / days.length / 2,
        width: s.plotW / days.length,
        y: s.M.top,
        height: s.plotH,
        fill: "var(--treatment-wash)",
      },
      svg
    );
  }
  drawTrendArea(svg, s, trend, idx);
  for (const d of weighIns) {
    el(
      "circle",
      {
        cx: s.x(idx.get(d.date)),
        cy: s.y(d.weightKg),
        r: 3,
        fill: "var(--muted)",
        stroke: "var(--page)",
        "stroke-width": 1.5,
      },
      svg
    );
  }
  const lastT = trend.at(-1);
  if (lastT) {
    el(
      "circle",
      {
        cx: s.x(idx.get(lastT.date)),
        cy: s.y(lastT.kg),
        r: 4.5,
        fill: "var(--kcal)",
        stroke: "var(--page)",
        "stroke-width": 2,
      },
      svg
    );
    const lbl = el(
      "text",
      {
        x: s.M.left + s.plotW + 5,
        y: s.y(lastT.kg) + 3,
        class: "refline-label",
      },
      svg
    );
    lbl.textContent = `${fmt1(lastT.kg)} kg`;
  }
  const crosshair = el(
    "line",
    {
      y1: s.M.top,
      y2: s.M.top + s.plotH,
      stroke: "var(--axis)",
      "stroke-width": 1,
      visibility: "hidden",
      "pointer-events": "none",
    },
    svg
  );
  bindWeightHover(svg, s, crosshair, trend);
  mount.appendChild(svg);
}

function heatCell(grid, d) {
  const heatVar = (meals) =>
    meals >= 4 ? "var(--heat-4)" : `var(--heat-${meals})`;
  const cell = html("span", "cell", grid);
  cell.tabIndex = 0;
  cell.setAttribute("role", "img");
  if (d.logged) {
    cell.classList.add("logged");
    cell.style.background = heatVar(d.meals);
  }
  if (d.cheats > 0) {
    cell.classList.add("cheat");
  }
  const status = d.logged
    ? `${d.meals} meals, ${fmtInt(d.totals.kcal)} kcal`
    : "not logged";
  const cheatNote = d.cheats > 0 ? `, ${d.cheats} cheat` : "";
  cell.setAttribute(
    "aria-label",
    `${shortDate(d.date)}: ${status}${cheatNote}`
  );
  bindTooltip(cell, () => {
    const rows = [[shortDate(d.date), ""]];
    if (d.logged) {
      rows.push(["meals", String(d.meals)]);
      rows.push(["kcal", fmtInt(d.totals.kcal)]);
    } else {
      rows.push(["not logged", ""]);
    }
    if (d.cheats > 0) {
      rows.push([`cheat: ${d.cheatSlots.join(", ")}`, ""]);
    }
    return rows;
  });
}

function renderHeatmap() {
  const key = document.getElementById("heatKey");
  keyEntry(key, "swatch", "var(--heat-2)", "darker = more meals");
  if (DATA.days.some((d) => d.cheats > 0)) {
    keySep(key);
    keyEntry(key, "dot", "var(--cheat)", "cheat meal");
  }
  const root = document.getElementById("heatmap");
  const labels = html("div", "heat-days", root);
  for (const t of ["Mon", "", "Wed", "", "Fri", "", "Sun"]) {
    html("span", "", labels).textContent = t;
  }
  const cols = html("div", "heat-cols", root);
  const lead = weekdayIndexMon(DATA.days[0].date);
  let col = null;
  let row = 0;
  let lastMonth = -1;
  const newCol = (firstDate) => {
    col = html("div", "heat-col", cols);
    const m = parseDate(firstDate).getUTCMonth();
    const lbl = html("span", "heat-month", col);
    if (m !== lastMonth) {
      lbl.textContent = MONTHS[m];
      lastMonth = m;
    }
  };
  newCol(DATA.days[0].date);
  for (let i = 0; i < lead; i++) {
    html("span", "cell blank", col);
    row += 1;
  }
  for (const d of DATA.days) {
    if (row === 7) {
      newCol(d.date);
      row = 0;
    }
    heatCell(col, d);
    row += 1;
  }
  const c = DATA.derived.consistency;
  document.getElementById("streakline").textContent =
    `${c.daysLogged} of ${c.totalDays} days logged (${c.pctLogged}%) · current streak ${c.currentStreak} · longest ${c.longestStreak}`;
}

function renderInsights() {
  const root = document.getElementById("insights");
  const items = Array.isArray(INSIGHTS) ? INSIGHTS : [];
  if (items.length === 0) {
    document.getElementById("insightsCard").remove();
    return;
  }
  for (const text of items) {
    html("p", "", root).textContent = text;
  }
}

function renderTable() {
  const box = document.getElementById("tablebox");
  const table = html("table", "", box);
  const thead = html("thead", "", table);
  const hr = html("tr", "", thead);
  for (const h of [
    "Date",
    "kcal",
    "Protein g",
    "Weight kg",
    "Meals",
    "Cheats",
    "Workout min",
  ]) {
    html("th", "", hr).textContent = h;
  }
  const tbody = html("tbody", "", table);
  for (const d of DATA.days) {
    const tr = html("tr", "", tbody);
    html("td", "", tr).textContent = shortDate(d.date);
    html("td", "", tr).textContent = d.logged ? fmtInt(d.totals.kcal) : "—";
    html("td", "", tr).textContent = d.logged ? fmt1(d.totals.protein) : "—";
    html("td", "", tr).textContent =
      d.weightKg === null ? "—" : fmt1(d.weightKg);
    html("td", "", tr).textContent = d.logged ? String(d.meals) : "—";
    html("td", "", tr).textContent = d.cheats > 0 ? String(d.cheats) : "";
    html("td", "", tr).textContent =
      d.workoutMin > 0 ? String(d.workoutMin) : "";
  }
}

function renderCharts() {
  renderKcalChart();
  renderWeightChart();
  renderProteinChart();
}

renderWindowLabel();
renderStats();
initKcalKey();
initWeightKey();
initProteinKey();
renderCharts();
renderHeatmap();
renderInsights();
renderTable();

let lastRenderedWidth = document.querySelector(".wrap").clientWidth;
window.addEventListener("resize", () => {
  requestAnimationFrame(() => {
    const w = document.querySelector(".wrap").clientWidth;
    if (w !== lastRenderedWidth) {
      lastRenderedWidth = w;
      renderCharts();
    }
  });
});
</script>
